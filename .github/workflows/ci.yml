name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Em-dash check (MDX)
        run: npm run check-em-dashes

      - name: Test
        run: npm test

      # postcss-via-next is moderate and blocked upstream (no fix available);
      # gate fails only on high+ vulnerabilities so that local moderate-blockers
      # don't permanently red the build. Re-evaluate when next.js bumps postcss.
      - name: Audit (high+ only)
        run: npm audit --audit-level=high
